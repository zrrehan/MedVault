name: Medivault - Medicine Delivery 

services: 
    database:
        container_name: medivault-postgres-db 
        image: postgres:18.3 
        restart: always 
        environment:
            POSTGRES_USER: admin 
            POSTGRES_PASSWORD: password 
            POSTGRES_DB: my-medivault-docker-db 
        ports: 
            - 5400:5432
        